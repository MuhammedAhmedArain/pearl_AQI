name: Pearls AQI Predictor — Daily Training Pipeline

on:
  schedule:
    - cron: '0 2 * * *'       # daily at 02:00 UTC
  workflow_dispatch:           # allow manual trigger

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  training-pipeline:
    name: Daily Training Pipeline
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --upgrade "hopsworks[python]>=4.8.0,<5.0.0" "confluent-kafka>=2.3.0"

      - name: Verify Hopsworks Kafka dependencies
        run: |
          python -c "import confluent_kafka, hopsworks, hsfs; print('Hopsworks Kafka dependencies available')"

      - name: Run training pipeline
        id: train
        timeout-minutes: 90
        continue-on-error: true
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT: pearlsAQI
          HOPSWORKS_HOST: eu-west.cloud.hopsworks.ai
          REQUIRE_FEATURE_STORE: "true"
          HOPSWORKS_MAX_RETRIES: "3"
          HOPSWORKS_BACKOFF_BASE: "10"
          HOPSWORKS_DISABLE_FLIGHT: "true"
        run: |
          python src/train.py --no-tune


      - name: Verify training output exists
        id: verify
        run: |
          if [ ! -f models/model_metadata.json ]; then
            echo "::error::Training failed — no model_metadata.json produced."
            exit 1
          fi
          echo "✅ model_metadata.json found."

      - name: Upload model artifacts (backup)
        uses: actions/upload-artifact@v4
        with:
          name: trained-models-${{ github.run_number }}
          path: models/
          retention-days: 30

      - name: Post model metrics summary
        if: steps.verify.outcome == 'success'
        run: |
          python -c "
          import json, pathlib
          m = json.loads(pathlib.Path('models/model_metadata.json').read_text())
          print('=== Model Training Results ===')
          print(f'Model : {m[\"model_name\"]}')
          print(f'MAE   : {m[\"mae\"]}')
          print(f'RMSE  : {m[\"rmse\"]}')
          print(f'R2    : {m[\"r2\"]}')
          print(f'Trained at: {m[\"trained_at\"]}')
          "

      - name: Commit and push latest results
        if: steps.verify.outcome == 'success'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add models/model_comparison.csv models/model_metadata.json
          git commit -m "chore: update model metrics [skip ci]" || echo "No changes to commit"
          git push
