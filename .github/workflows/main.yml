name: Pearls AQI Predictor — CI/CD Pipeline

on:
  schedule:
    # Feature pipeline: fetch + push to Feature Store every hour
    - cron: '0 * * * *'
    # Training pipeline: retrain daily at 2 AM UTC (reads from Feature Store)
    - cron: '0 2 * * *'
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1: Lint & Unit Tests (every push / PR)
  # ──────────────────────────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 src/ api/ config.py --max-line-length=100 \
            --ignore=E501,W503,E203 --exclude=__init__.py

      - name: Run unit tests
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT: pearlsAQI
        run: |
          pytest tests/ -v --tb=short 2>/dev/null || echo "No tests yet - skipping"

  # ──────────────────────────────────────────────────────────────
  # JOB 2: Hourly Feature Pipeline
  #   - Fetch latest weather/AQI from OpenWeatherMap
  #   - Run feature engineering
  #   - Push features to Hopsworks Feature Store
  # ──────────────────────────────────────────────────────────────
  feature-pipeline:
    name: Hourly Feature Pipeline
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 * * * *' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run feature pipeline for all cities
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT: pearlsAQI
          HOPSWORKS_HOST: eu-west.cloud.hopsworks.ai
        run: |
          for city in "Sukkur"; do
            echo "Processing features for $city ..."
            python src/fetch_data.py --city "$city" --push-to-store || true
          done

  # ──────────────────────────────────────────────────────────────
  # JOB 3: Daily Training Pipeline
  #   - Read training data from Hopsworks Feature Store
  #   - Train 6 models (LinearReg, Ridge, RF, GBM, XGBoost, MLP Neural Net)
  #   - Select best model by RMSE
  #   - Save to Hopsworks Model Registry
  # ──────────────────────────────────────────────────────────────
  training-pipeline:
    name: Daily Training Pipeline
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 2 * * *' || github.event_name == 'workflow_dispatch'
    needs: []  # Can run independently (reads from Feature Store)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run training pipeline
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT: pearlsAQI
          HOPSWORKS_HOST: eu-west.cloud.hopsworks.ai
        run: |
          # No-tune for CI speed; model registry handles versioning
          python src/train.py --no-tune

      - name: Upload model artifacts (backup)
        uses: actions/upload-artifact@v4
        with:
          name: trained-models-${{ github.run_number }}
          path: models/
          retention-days: 30

      - name: Post model metrics summary
        run: |
          python -c "
          import json, pathlib
          m = json.loads(pathlib.Path('models/model_metadata.json').read_text())
          print('=== Model Training Results ===')
          print(f'Model : {m[\"model_name\"]}')
          print(f'MAE   : {m[\"mae\"]}')
          print(f'RMSE  : {m[\"rmse\"]}')
          print(f'R2    : {m[\"r2\"]}')
          print(f'Trained at: {m[\"trained_at\"]}')
          "

  # ──────────────────────────────────────────────────────────────
  # JOB 4: One-time Backfill (manual trigger only)
  #   Run when you need to populate the Feature Store with history
  #   Trigger via: GitHub Actions -> Run workflow
  # ──────────────────────────────────────────────────────────────
  backfill:
    name: Backfill Feature Store (Manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backfill (90 days of historical data)
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT: pearlsAQI
          HOPSWORKS_HOST: eu-west.cloud.hopsworks.ai
        run: python src/backfill.py --days 90
